# /etc/nginx/sites-available/aim
#
# AIM TLS reverse proxy.
#  - aim_web      :4002  → /
#  - aim_gateway  :4003  → /api
#  - WebSocket for LiveView at /live
#  - Rust services :8770-8774 are NOT exposed publicly.
#
# Required: certbot certificates at /etc/letsencrypt/live/aim.example.com/.

upstream aim_web      { server 127.0.0.1:4002; keepalive 32; }
upstream aim_gateway  { server 127.0.0.1:4003; keepalive 32; }

# 1 RPS bursting to 20, per-IP. Phoenix has its own per-token limit on top.
limit_req_zone $binary_remote_addr zone=aim_api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=aim_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name aim.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aim.example.com;

    ssl_certificate     /etc/letsencrypt/live/aim.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aim.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers off;

    # Hardening (Phoenix also sets these, double-belt is fine).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    server_tokens off;

    client_max_body_size 8m;
    client_body_timeout 60s;
    keepalive_timeout 65;

    limit_conn aim_conn 30;

    # ── API ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=aim_api burst=20 nodelay;
        proxy_pass         http://aim_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_read_timeout 180s;
    }

    # ── LiveView WebSocket ─────────────────────────────────────────────
    location /live {
        proxy_pass         http://aim_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # ── HTML (LiveView pages) ──────────────────────────────────────────
    location / {
        proxy_pass         http://aim_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
    }

    # Block access to /metrics — internal only.
    location /metrics { return 404; }
}
