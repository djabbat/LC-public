[package]
name = "ssa-api"
version = "0.1.0"
edition = "2021"
description = "SSA — Syndromic Hematology Analyzer (AIM subproject)"
license = "MIT"

[dependencies]
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"

[[bin]]
name = "ssa-api"
path = "src/main.rs"
