<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>AIM · Memory Editor</title>
<style>
body{font-family:system-ui,sans-serif;max-width:900px;margin:1rem auto;padding:0 1rem;color:#222;}
h1{margin:.5rem 0;}
.bar{display:flex;gap:.5rem;margin-bottom:1rem;}
.bar input{flex:1;padding:.5rem;border:1px solid #bbb;border-radius:4px;}
button{padding:.5rem 1rem;background:#205493;color:white;border:0;border-radius:4px;cursor:pointer;}
button.secondary{background:#777;}
button.danger{background:#b30000;}
.card{border:1px solid #ddd;border-radius:6px;padding:.7rem;margin-bottom:.7rem;background:#fafafa;}
.meta{color:#666;font-size:.85em;margin-top:.4rem;}
.tag{display:inline-block;padding:.05rem .4rem;background:#eef;border-radius:3px;margin-right:.3rem;font-size:.8em;}
.actions{margin-top:.4rem;display:flex;gap:.4rem;}
pre{white-space:pre-wrap;margin:0;}
</style>
</head>
<body>
<h1>🧠 AIM · Memory Editor</h1>

<div class="bar">
  <input id="q" placeholder="поиск в памяти…" autofocus>
  <select id="mode">
    <option value="flat">flat</option>
    <option value="graph">GraphRAG</option>
  </select>
  <button onclick="search()">Поиск</button>
  <button class="secondary" onclick="add()">+ факт</button>
</div>

<div id="results"></div>

<script>
const api = (path, opts={}) => fetch(path, {headers:{"Content-Type":"application/json"}, ...opts});

async function search(){
  const q = document.getElementById("q").value.trim();
  const mode = document.getElementById("mode").value;
  const r = await api(`/api/memory/search?q=${encodeURIComponent(q)}&mode=${mode}&k=20`);
  const hits = await r.json();
  const root = document.getElementById("results");
  root.innerHTML = "";
  if(!hits.length){ root.innerHTML = "<p>(нет совпадений)</p>"; return; }
  for(const h of hits){
    const card = document.createElement("div");
    card.className = "card";
    const tagsHtml = (h.tags||[]).map(t => `<span class=tag>${t}</span>`).join("");
    card.innerHTML = `
      <pre>${escapeHtml((h.text||"").slice(0,1200))}</pre>
      <div class=meta>
        <code>${h.file||""}</code> ·
        distance ${(h._distance ?? 0).toFixed(3)} ·
        priority ${h.priority||"NORMAL"} ${tagsHtml}
      </div>
      <div class=actions>
        <button onclick='editFact("${h.file}")'>✏️ изменить</button>
        <button class=danger onclick='delFact("${h.file}")'>🗑 удалить</button>
      </div>`;
    root.appendChild(card);
  }
}

async function add(){
  const text = prompt("новый факт?"); if(!text) return;
  const category = prompt("категория?", "general") || "general";
  const tags = prompt("теги через запятую (опц)", "") || "";
  await api("/api/memory/add",{method:"POST",body:JSON.stringify({text,category,tags})});
  search();
}
async function editFact(file){
  const r = await api(`/api/memory/get?file=${encodeURIComponent(file)}`);
  const cur = (await r.json()).text || "";
  const next = prompt("новый текст:", cur);
  if(next!=null){
    await api("/api/memory/update",{method:"POST",body:JSON.stringify({file,text:next})});
    search();
  }
}
async function delFact(file){
  if(!confirm("удалить?")) return;
  await api("/api/memory/delete",{method:"POST",body:JSON.stringify({file})});
  search();
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);}
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")search();});
search();
</script>
</body>
</html>
