[workspace]
resolver = "2"
members = ["biosense-core", "biosense-hrv", "biosense-cli"]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Jaba Tkemaladze"]
license = "MIT"
description = "BioSense — wearable biomonitoring (EEG · HRV · olfactory). Rust port of Python pipeline."

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
clap = { version = "4", features = ["derive"] }
