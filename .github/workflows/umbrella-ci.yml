name: LongevityCommon umbrella CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Aligned with umbrella CONCEPT v5.6 (2026-04-28).
# Runs in parallel: Ze cargo test, BioSense cargo test, social server cargo build.
# Phoenix subproject compile checks via mix.

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  LONGEVITYCOMMON_VERSION: "v5.6"

jobs:
  # ── Subproject: Ze ────────────────────────────────────────────────────────
  ze-rust:
    name: Ze · cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Ze
      - name: cargo build --release
        working-directory: Ze
        run: cargo build --release
      - name: cargo test (F1–F6 + unit)
        working-directory: Ze
        run: cargo test --release --no-fail-fast

  ze-phoenix:
    name: Ze · mix compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'
      - name: mix deps.get + compile
        working-directory: Ze/ze-web
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile --warnings-as-errors

  # ── Subproject: BioSense ──────────────────────────────────────────────────
  biosense-rust:
    name: BioSense · cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: BioSense
      - name: cargo build --release
        working-directory: BioSense
        run: cargo build --release
      - name: cargo test (B1–B6 + datasets)
        working-directory: BioSense
        run: cargo test --release --no-fail-fast

  biosense-phoenix:
    name: BioSense · mix compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'
      - name: mix deps.get + compile
        working-directory: BioSense/biosense-web
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile --warnings-as-errors

  # ── Social layer ─────────────────────────────────────────────────────────
  server-rust:
    name: Social server · cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: cargo build --release
        working-directory: server
        run: cargo build --release

  realtime-phoenix:
    name: Social realtime · mix compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'
      - name: mix deps.get + compile
        working-directory: realtime
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile

  web-react:
    name: Social web · npm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: npm ci + build
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

  # ── Cross-cutting ─────────────────────────────────────────────────────────
  doc-consistency:
    name: Doc consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all required core .md files exist
        run: |
          required=(CONCEPT.md THEORY.md DESIGN.md PARAMETERS.md MAP.md STATE.md EVIDENCE.md OPEN_PROBLEMS.md TODO.md README.md)
          missing=()
          for d in . Ze BioSense; do
            for f in "${required[@]}"; do
              if [ ! -f "$d/$f" ]; then
                missing+=("$d/$f")
              fi
            done
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing core .md files:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required core .md files present in umbrella + Ze + BioSense."

      - name: Verify v_star constant consistency (Python convention 0.45631)
        run: |
          fail=0
          for f in Ze/ze-simulator/src/lib.rs BioSense/biosense-simulator/src/lib.rs; do
            if [ -f "$f" ] && ! grep -q "0.45631" "$f"; then
              echo "v* constant 0.45631 missing from $f"
              fail=1
            fi
          done
          test $fail -eq 0

      - name: Verify TOXIC subprojects not imported in code
        run: |
          # HAP and Ontogenesis must not appear in any production code path
          violations=$(grep -rn -E "(use|import|from) (HAP|Ontogenesis)" \
            --include="*.rs" --include="*.ts" --include="*.tsx" --include="*.ex" \
            Ze/ BioSense/ server/ web/ realtime/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "TOXIC subproject imports found:"
            echo "$violations"
            exit 1
          fi
          echo "No TOXIC subproject imports."

  # ── Aggregate result ─────────────────────────────────────────────────────
  all-pass:
    name: All checks
    runs-on: ubuntu-latest
    needs:
      - ze-rust
      - ze-phoenix
      - biosense-rust
      - biosense-phoenix
      - server-rust
      - realtime-phoenix
      - web-react
      - doc-consistency
    steps:
      - run: echo "All umbrella CI jobs passed."
