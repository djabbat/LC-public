server {
    listen 80;
    listen [::]:80;
    server_name fclc.longevity.ge;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Rust orchestrator REST API (existing)
    location /api/ {
        proxy_pass http://127.0.0.1:4002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        include /etc/nginx/snippets/hive-button.conf;
    }

    # Phoenix LiveView WebSocket (must be before location /)
    location /live/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        include /etc/nginx/snippets/hive-button.conf;
    }

    # Phoenix LiveView frontend (replaces HTML stub)
    location / {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        include /etc/nginx/snippets/eco-inject.conf;
        include /etc/nginx/snippets/hive-button.conf;
    }
}
