server {
    listen 80;
    listen [::]:80;
    server_name app.longevity.ge;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / {
        return 200 "LC umbrella · social server pending deployment · meanwhile see ze.longevity.ge / biosense.longevity.ge / fclc.longevity.ge / longevity.ge/rescience/\n";
        add_header Content-Type text/plain;
        include /etc/nginx/snippets/eco-inject.conf;
        include /etc/nginx/snippets/hive-button.conf;
    }
}
