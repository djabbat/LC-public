server {
	listen 80;
	listen [::]:80;

	server_name longevity.ge;
	include /etc/nginx/snippets/cloudflare-real-ip.conf;
	client_max_body_size 55M;
	root /home/jaba/web/longevity;

	index index.php index.html index.htm;

	# Access and error logs
	access_log /var/log/nginx/example-access.log;
	error_log /var/log/nginx/example-error.log;

	# Serve static files directly with caching
	#location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
	#expires 30d;
	#		add_header Cache-Control "public, immutable";
	#	access_log off;
	#}

	# NGO static site — root and top-level pages
	location = / {
		root /home/jaba/web/ngo;
		try_files /index.html =404;
	}
	location = /about/   { root /home/jaba/web/ngo; try_files /about/index.html =404; }
	location = /team/    { root /home/jaba/web/ngo; try_files /team/index.html =404; }
	location = /research/    { root /home/jaba/web/ngo; try_files /research/index.html =404; }
	location = /publications/ { root /home/jaba/web/ngo; try_files /publications/index.html =404; }
	location = /grants/  { root /home/jaba/web/ngo; try_files /grants/index.html =404; }
	location = /contact/ { root /home/jaba/web/ngo; try_files /contact/index.html =404; }
	# Redirect без слеша
	location ~* ^/(about|team|research|publications|grants|contact)$ { return 301 $uri/; }
	# eco-inject.js — no-cache so updates propagate immediately
	location = /eco-inject.js {
		root /home/jaba/web/ngo;
		access_log off;
		add_header Cache-Control "no-cache, must-revalidate";
	}

	# Статика NGO
	location ~* ^/(assets|css|team/img) {
		root /home/jaba/web/ngo;
		access_log off;
		expires 7d;
	}

	# Public research tracker — /grants/progress + JSON (Monetaria C4 Phase 1, 2026-04-25)
	location = /grants/progress       { root /home/jaba/web/longevity/public; try_files /grants/index.html =404; }
	location = /grants/progress.json  { root /home/jaba/web/longevity/public; try_files /grants/progress.json =404; default_type application/json; }

	# Privacy policy and Terms of service — standalone HTML (Monetaria 2026-04-25, for ad-network compliance)
	location = /about/privacy { root /home/jaba/web/longevity; try_files /about/privacy.html =404; }
	location = /about/terms   { root /home/jaba/web/longevity; try_files /about/terms.html =404; }

	# Sitemap aliases for indexers (Google, DOAJ, etc.) — point .xml URLs to OJS routes
	location = /sitemap.xml { return 301 /index/sitemap; }
	location = /rescience/sitemap.xml { return 301 /rescience/sitemap; }
	location = /longhoriz/sitemap.xml { return 301 /longhoriz/sitemap; }

	# OJS — все остальные пути
	location / {
		try_files $uri $uri/ /index.php?$args;

		if (!-e $request_filename) {
			rewrite ^/(.*)$ /index.php/$1 last;
			break;
		}
	}

	location ~ ^/api/ {
		try_files $uri /index.php?$args;
	}

	# deny php execution in upload directories (must be before PHP handler)
	location ~* ^/(files|oje_files)/.*\.(php|phtml|php5|shtml|phar)$ {
		deny all;
		return 404;
	}

	location ~ ^(.+\.php)(.*)$ {
		set $path_info $fastcgi_path_info;
		fastcgi_split_path_info ^(.+\.php)(.*)$;
		fastcgi_param PATH_INFO $path_info;
		fastcgi_param PATH_TRANSLATED $document_root$path_info;

		if (!-f $document_root$fastcgi_script_name) {
			return 404;
		}

		include fastcgi_params;
		fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;  # Adjust PHP version
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		if ($request_uri ~* "\.pdf$|/pdf$") {
			add_header Content-Disposition 'inline' always;
		}
	}



	# Deny access to .htaccess files
	location ~ /\.ht {
		deny all;
	}
}
                                                                             
  server {                                                                      
      listen 80;                                                             
      listen [::]:80;                                                           
      server_name www.longevity.ge;                                          
      return 301 https://longevity.ge$request_uri;
  }
