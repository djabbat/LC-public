server {
    listen 80;
    listen [::]:80;
    server_name mcoa.longevity.ge;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / {
        root /var/www/mcoa-landing;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/eco-inject.conf;
        include /etc/nginx/snippets/hive-button.conf;
    }
}
