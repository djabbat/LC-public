# Force home <section class="hero"> to inline indigo + white so the
# Georgia Longevity Alliance banner stays branded in BOTH themes,
# regardless of dark-mode CSS cascade.
proxy_set_header Accept-Encoding "";
sub_filter_types text/html;
sub_filter_once on;
sub_filter "<section class=\"hero\">" "<section class=\"hero\" style=\"background:linear-gradient(135deg,#1e1b4b 0%,#312e81 35%,#4338ca 75%,#6366f1 100%) !important;color:#fff !important\">";
