server {
    listen 80;
    server_name ze.longevity.ge;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ze.longevity.ge;

    # SSL — managed by certbot (run after DNS A-record is in place):
    #   certbot --nginx -d ze.longevity.ge
    # ssl_certificate /etc/letsencrypt/live/ze.longevity.ge/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ze.longevity.ge/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Phoenix LiveView WebSocket (must be before location /)
    location /live/ {
        proxy_pass http://127.0.0.1:4400;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Rust ze-backend API (read-only science; no user data)
    location /api/ {
        proxy_pass http://127.0.0.1:4401/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:4400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
