[package]
name = "mito_ros_counter"
version = "0.2.0"
edition = "2021"
authors = ["Jaba Tkemaladze <jaba@longevity.ge>"]
description = "MCOA Counter #3"
license = "MIT"

[[bin]]
name = "mito_ros-sim"
path = "src/main.rs"

[lib]
name = "mito_ros_counter"
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
